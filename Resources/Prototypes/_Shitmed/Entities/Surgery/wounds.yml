- type: entity
  id: Ion
  parent: WoundBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Wound
    damageType: Ion
    woundType: External
    woundVisibility: Always
  - type: TraumaInflicter
    severityThreshold: 17
    allowedTraumas:
#    - OrganDamage
#    - BoneDamage
    - VeinsDamage
    allowArmourDeduction:
    - OrganDamage # No matter what ultrasuperduper cool armour you have, while getting fucking boiled alive - YOUR VEINS AND NERVES WILL HURT.
    - BoneDamage
    traumasChances:
      Dismemberment: 0
#      OrganDamage: -0.12
#      BoneDamage: -0.21
      VeinsDamage: 0.34
    mangledMultipliers:
      BoneDamage: 1

