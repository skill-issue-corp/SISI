- type: entity
  id: WoundBase
  abstract: true
  components:
  - type: Wound
    damageType: Blunt
  - type: ContainerContainer
    containers:
      Traumas: !type:Container
        ents: [ ]

- type: entity
  id: Blunt
  parent: WoundBase
  components:
  - type: Wound
    damageType: Blunt
    woundType: External
    woundVisibility: Always
    mangleSeverity: Severe
  - type: TraumaInflicter
    severityThreshold: 12
    allowedTraumas:
    - Dismemberment
    - OrganDamage
    - BoneDamage
    - VeinsDamage
    allowArmourDeduction:
    - Dismemberment
    - OrganDamage
    - BoneDamage
    - VeinsDamage
    traumasChances:
      Dismemberment: -2
      OrganDamage: 0.17
      BoneDamage: 0.8
      VeinsDamage: 0
    mangledMultipliers:
      BoneDamage: 1

- type: entity
  id: Piercing
  parent: WoundBase
  components:
  - type: Wound
    damageType: Piercing
    woundType: External
    woundVisibility: Always
    mangleSeverity: Severe
  - type: TraumaInflicter
    severityThreshold: 12
    allowedTraumas:
    - Dismemberment
    - OrganDamage
    - BoneDamage
    - VeinsDamage
    allowArmourDeduction:
    - Dismemberment
    - OrganDamage
    - BoneDamage
    - VeinsDamage
    traumasChances:
      Dismemberment: -2
      OrganDamage: 0.08
      BoneDamage: 0.14
      VeinsDamage: -0.4 # goes through rather easy.
    mangledMultipliers:
      BoneDamage: 0.1
  - type: BleedInflicter
    severityThreshold: 9
    scalingSpeed: 0.5

- type: entity
  id: ArmorPiercing
  parent: WoundBase
  components:
  - type: Wound
    woundType: External
    woundVisibility: Always
    selfHealMultiplier: 0
  - type: TraumaInflicter
    severityThreshold: 6
    allowArmourDeduction:
    - OrganDamage
    - BoneDamage
    - VeinsDamage
    allowedTraumas:
    - OrganDamage
    - BoneDamage
    - VeinsDamage
    traumasChances:
      Dismemberment: -1.8 # Bullets go THROUGH people
      OrganDamage: 0.24
      BoneDamage: 0.24
      VeinsDamage: -0.4
  - type: BleedInflicter
    scalingSpeed: 0.34
    severityThreshold: 5

