    mangleSeverity: Severe
  - type: TraumaInflicter
    severityThreshold: 9
    allowedTraumas:
    - Dismemberment
    - VeinsDamage
    allowArmourDeduction:
    - Dismemberment # seems rather reasonable. Wear armour, guys
    - VeinsDamage
    traumasChances:
      Dismemberment: 0.2
      OrganDamage: 0
      BoneDamage: 0
      VeinsDamage: 0.27
    mangledMultipliers:
      BoneDamage: 0.2
  - type: BleedInflicter
    scalingSpeed: 1.7

