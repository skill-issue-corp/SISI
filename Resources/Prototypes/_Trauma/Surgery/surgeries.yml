# Brain Chip

- type: entity
  parent: BaseSurgeryInsertOrgan
  id: SurgeryInsertBrainChip
  name: Install Brain Chip
  components:
  - type: Surgery
    steps:
    - SurgeryStepOpenIncisionScalpel
    - SurgeryStepClampBleeders
    - SurgeryStepOpenPanel
    - SurgeryStepInsertBrainChip
    - SurgeryStepSealOrganWound
  - type: SurgeryOrganSlotCondition
    organSlot: BrainChip
  - type: SurgeryOrganCondition
    organ: BrainChip

- type: entity
  parent: BaseSurgeryRemoveOrgan
  id: SurgeryRemoveBrainChip
  name: Extract Brain Chip
  components:
  - type: Surgery
    steps:
    - SurgeryStepOpenIncisionScalpel
    - SurgeryStepClampBleeders
    - SurgeryStepOpenPanel
    - SurgeryStepRemoveOrgan
  - type: SurgeryOrganCondition
    organ: BrainChip

# Tail

- type: entity
  parent: SurgeryOpenCavityBase
  id: SurgeryOpenTailSlot
  name: Create Tail Joint
  components:
  - type: Surgery
    requirement: SurgeryOpenIncision
    steps:
    - SurgeryStepSawBones
    - SurgeryStepCreateJoint
    - SurgeryStepStitchJoint
    - SurgeryStepOpenOrganSlot
  - type: SurgeryPartCondition
    parts: [ Torso ]
  - type: SurgeryOrganSlotCondition
    organSlot: Tail

# Tongue

- type: entity
  parent: BaseSurgeryRemoveOrgan
  id: SurgeryRemoveTongue
  name: Remove Tongue
  components:
  - type: SurgeryOrganCondition
    organ: Tongue

- type: entity
  parent: BaseSurgeryInsertOrgan
  id: SurgeryInsertTongue
  name: Insert Tongue
  components:
  - type: Surgery
    steps:
    - SurgeryStepSawBones
    - SurgeryStepInsertOrgan
    - SurgeryStepSealOrganWound
  - type: SurgeryOrganSlotCondition
    organSlot: Tongue
  - type: SurgeryOrganCondition
    organ: Tongue

# Kidneys

- type: entity
  parent: BaseSurgeryRemoveOrgan
  id: SurgeryRemoveKidneys
  name: Remove Kidneys
  components:
  - type: SurgeryOrganCondition
    organ: Kidneys

- type: entity
  parent: BaseSurgeryInsertOrgan
  id: SurgeryInsertKidneys
  name: Insert Kidneys
  components:
  - type: SurgeryOrganSlotCondition
    organSlot: Kidneys
  - type: SurgeryOrganCondition
    organ: Kidneys

# Wings

- type: entity
  parent: SurgeryOpenCavityBase
  id: SurgeryOpenWingsSlot
  name: Create Wing Joints
  components:
  - type: Surgery
    requirement: SurgeryOpenIncision
    steps:
    - SurgeryStepSawBones
    - SurgeryStepCreateJoint
    - SurgeryStepStitchJoint
    - SurgeryStepOpenOrganSlot
  - type: SurgeryPartCondition
    parts: [ Torso ]
  - type: SurgeryOrganSlotCondition
    organSlot: Wings

- type: entity
  parent: SurgeryAttachBase
  id: SurgeryAttachWings
  name: Attach Wings
  components:
  - type: SurgeryPartRemovedCondition
    category: Wings
