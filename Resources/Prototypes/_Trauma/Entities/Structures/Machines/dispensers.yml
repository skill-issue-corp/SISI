- type: entity
  parent: EnergyChemDispenser
  id: ServiceEnergyChemDispenser
  name: energy food synthesizer
  suffix: energy
  description: A bluespace Chemical Dispenser that uses station energy to synthesize organic reagents. The future for chefs is here and now.
  components:
  - type: Machine
    board: EnergyFoodSynthesizerMachineCircuitboard
  - type: Sprite
    sprite: _Trauma/Structures/Machines/service_dispenser.rsi
    state: industrial-working
    snapCardinals: true
  - type: GuideHelp
    guides:
    - Chef
    - FoodRecipes
  - type: EnergyReagentDispenser
    reagents:
      # Common cooking ingredients
      Flour: 4
      Cornmeal: 4
      Rice: 4
      Egg: 12
      Milk: 12
      Sugar: 3
      Water: 3
      # Uncommon ingredients
      Fat: 20
      UncookedAnimalProteins: 20
      MilkSoy: 16
      Oats: 14
      Vinegar: 8
      OilOlive: 5
      # Condiments
      TableSalt: 2
      Blackpepper: 2
      BbqSauce: 2
      Soysauce: 4
      Mustard: 3
      Ketchup: 3
      Mayo: 3
      Hotsauce: 3
      Syrup: 3
      Vinaigrette: 4
      Astrotame: 8
      HorseradishSauce: 4
      Cornoil: 4

- type: entity
  id: EnergyBarDispenserBase
  parent: EnergyChemDispenser
  suffix: Energy
  abstract: true
  components:
  - type: Sprite
    sprite: Structures/smalldispensers.rsi
    drawdepth: SmallObjects
    snapCardinals: false
  - type: Rotatable
  - type: Transform
    noRot: false
  - type: GuideHelp
    guides:
    - Bartender
    - Drinks
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.3,0.4,0.3"
        density: 190
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer

- type: entity
  parent: EnergyBarDispenserBase
  id: EnergyBoozeDispenser
  name: energy booze dispenser
  description: A drunk mans best dream. Using the power of bluespace, this dispenser uses station energy to produce alcoholic beverages! Now you can get wasted without leaving the bar to restock! Ever!
  components:
