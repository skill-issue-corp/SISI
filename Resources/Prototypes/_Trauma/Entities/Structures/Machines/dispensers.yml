    board: EnergyBoozeDispenserMachineCircuitboard
  - type: Sprite
    state: booze
  - type: StealTarget
    stealGroup: BoozeDispenser
  - type: EnergyReagentDispenser
    reagents:
      Absinthe: 5
      Ale: 5
      Beer: 5
      BlueCuracao: 5
      Cognac: 5
      Gin: 5
      Mead: 5
