# Slam

- type: combo
  abstract: true
  id: BaseCQCSlam
  attacks:
  - Grab
  - Harm
  userEffects:
  - !type:PlaySoundEffect
    sound: /Audio/Weapons/genhit2.ogg
  - !type:PopupMessage
    messages:
    - cqc-slam

- type: combo
  parent: BaseCQCSlam
  id: CQCSlamSimple
  opponentEffects:
  - !type:TakeStaminaDamage
    amount: 15
  - !type:ModifyKnockdown
    time: 2
    drop: true
  levelRequired: 0
  levelExceeded: 26

- type: combo
  parent: BaseCQCSlam
  id: CQCSlam
  opponentEffects:
  - !type:TakeStaminaDamage
    amount: 25
  - !type:HealthChange
    targetPart: Chest
    damage:
      types:
        Blunt: 12
  - !type:ModifyKnockdown
    time: 5
    drop: true
    type: Update
  levelRequired: 26

# Kick

- type: combo
  abstract: true
  id: BaseCQCKick
  attacks:
  - Harm
  - Harm
  # cant kick without legs
  userConditions:
  - !type:HasOrgan
    organCategory: LegLeft
  - !type:HasOrgan
    organCategory: LegRight
  userEffects:
  - !type:PlaySoundEffect
    sound: /Audio/Weapons/genhit2.ogg
  - !type:PopupMessage
    messages:
    - cqc-kick
  opponentEffects:
  - !type:StopPull
  - !type:GrabThrow

- type: combo
  parent: BaseCQCKick
  id: CQCKickSimple
  opponentEffects:
  - !type:HealthChange
    targetPart: Chest
    damage:
      types:
        Blunt: 8
  - !type:ModifyKnockdown
    time: 1
  levelRequired: 0
  levelExceeded: 26

- type: combo
  parent: BaseCQCKick
  id: CQCKick
  opponentEffects:
  - !type:IfElse
    condition: !type:StandingCondition
      inverted: true
    trueEffects: # kicking someone on the ground is much stronger
    - !type:TakeStaminaDamage
      amount: 45
    - !type:HealthChange
      targetPart: Head
      damage:
        types:
          Blunt: 10
    - !type:ModifyStatusEffect
      effectProto: StatusEffectForcedSleeping
      time: 8
      conditions:
      - !type:StaminaCritical
    falseEffects:
    - !type:TakeStaminaDamage
      amount: 20
  levelRequired: 26
  levelExceeded: 60

- type: combo
  parent: BaseCQCKick
  id: CQCKickAdvanced
  opponentEffects:
  - !type:IfElse
    condition: !type:StandingCondition
      inverted: true
    trueEffects: # kicking someone on the ground is much stronger
    - !type:TakeStaminaDamage
      amount: 55
    - !type:HealthChange
      targetPart: Head
      damage:
        types:
          Blunt: 20
    - !type:ModifyStatusEffect
      effectProto: StatusEffectForcedSleeping
      time: 12
      conditions:
      - !type:StaminaCritical
    falseEffects:
    - !type:TakeStaminaDamage
      amount: 25
  levelRequired: 60

