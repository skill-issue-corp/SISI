- type: entity
  abstract: true
  id: MobSpaceLeviathanSegmentBase
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 1
        density: 137992
        mask:
        - FlyingMobMask
        layer:
        - Opaque
        - BulletImpassable
        - LowImpassable
        - MidImpassable
        - WallLayer # inky edit
  - type: DamageOnCollide
    inverted: true # fuck you wrath components!
    damage:
      types:
        Structural: 5000
#        Blunt: 0.1 # inky edit - its damage per tick :tear:
    ignoreWhitelist:
      components:
      - ContainmentField
  - type: Sprite
    sprite: _Goobstation/Mobs/SpaceWhale/leviathan.rsi
    noRot: false
    layers:
    - state: head
    - state: overlay
      shader: unshaded
    drawdepth: Overdoors
  - type: Tag
    tags:
    - SpaceWhaleSegment
    - StunImmune
  - type: PreventCollide
    whitelist:
      tags:
      - SpaceWhaleSegment
  # inky
  - type: FTLSmashImmune
  - type: SupermatterImmune
  - type: EventHorizonIgnore
  - type: GravityAffected
  # /inky

- type: entity
  id: SpaceLeviathan
  parent: [MobSpaceLeviathanSegmentBase] # inky edit
  name: space whale
  description: When the space becomes too quiet, there is no hope, there is no escape, but there is this.
  components:
  - type: TailedEntity
    amount: 65
    spacing: 1
    prototype: SpaceWhaleSegment
  - type: MovementSpeedModifier
    baseSprintSpeed: 40
    baseWalkSpeed: 11
    baseWeightlessFriction: 1 # inky edit
    weightlessFriction: 1 # inky edit
    weightlessFrictionNoInput: 1 # inky edit
    weightlessAcceleration: 0.65 # inky edit
  - type: DamageOnHighSpeedImpact
    minimumSpeed: 90 # inky edit
    # inky start
    soundHit:
      collection: MetalThud
    damage:
      types:
        Blunt: 5
    # /inky
  - type: RadarBlip
    scale: 3
    shape: hexagon
    visibleFromOtherGrids: true
  - type: MovementIgnoreGravity
    weightless: true # wtf lol?
  - type: WarpPoint
    follow: true
    location: space leviathan
  - type: HTN
    rootTask:
      task: DragonCarpCompound
  - type: NpcFactionMember
    factions:
    - Dragon #goida, also the carpsuit buff
  - type: Speech
    speechVerb: LargeMob
  - type: InteractionPopup
    interactSuccessString: petting-success-leviathan
    interactFailureString: petting-failure-leviathan
    interactFailureSound:
      path: /Audio/Effects/bite.ogg
  - type: NightVision
    color: "#808080"
    activateSound: null
    deactivateSound: null
  - type: AmbientSound
    enabled: true
    volume: 1
    range: 50
    sound:
      path: /Audio/_Goobstation/Ambience/SpaceWhale/leviathan-ambient.ogg
  - type: Vocal
    wilhelm: "/Audio/_Goobstation/Ambience/SpaceWhale/imafuckingworm.ogg"
    wilhelmProbability: 1 # funy
  - type: MobThresholds
    thresholds:
      0: Alive
      2000: Dead # inky edit
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 18000 # inky edit (it breaks a lot of shit)
      behaviors:
      - !type:GibBehavior
  - type: ContentEye
    maxZoom: 1.5,1.5
    targetZoom: 1.5,1.5
  - type: SolutionManager
  - type: InjectableSolution
    solution: chemicals
  - type: Bloodstream
    maxBleedAmount: 5
    bloodRefreshAmount: 300
    bleedReductionAmount: 2
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 5000
    bloodlossDamage:
      types:
        Bloodloss: 0
    bloodlossHealDamage:
      types:
        Bloodloss: -1
  - type: CombatMode
    toggleMouseRotator: false
  - type: MeleeWeapon
    range: 3
    canWideSwing: false
    altDisarm: false
    attackRate: 0.3
    angle: 0
    animation: WeaponArcBite
    soundHit:
      path: /Audio/Effects/bite.ogg
    damage:
      types:
        Blunt: 33 # inky edit
        Slash: 33 # inky edit
        Structural: 800 #lol
  - type: NoRotateOnMove
  # inky
  - type: LimitedInstances
    key: SpaceLeviathan
    limit: 1
  - type: FTLSmashImmune
  - type: SupermatterImmune
  - type: EventHorizonIgnore
  - type: SpaceLeviathan
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 2.5
        density: 137992
        mask:
        - FlyingMobMask
        layer:
        - Opaque
        - BulletImpassable
        - LowImpassable
        - MidImpassable
        - WallLayer
  - type: SpawnLootOnDeath
    table: !type:AllSelector
      children:
      - id: MaterialLeviathanScale1
      - id: MaterialLeviathanScale1
    deleteOnDeath: true
  - type: NoSlip
  - type: MovementAlwaysTouching
  - type: CanMoveInAir
  # HATE below, this is needed
  - type: Clickable
  - type: InteractionOutline
  - type: InputMover
  - type: Input
    context: "human"
  - type: LagCompensation
  - type: MobMover
  - type: Actions
  - type: Appearance
  - type: RotationVisuals
    defaultRotation: 0
    horizontalRotation: 0
  - type: DoAfter
  - type: Examiner
#  - type: Eye
  - type: RequireProjectileTarget
    active: False
  - type: MobState
  - type: Injurable
    damageContainer: Inorganic
  - type: Damageable
    damageModifierSet: Leviathan # no lasers
  - type: Physics
    bodyType: KinematicController
    bodyStatus: InAir
    linearDamping: 0.0005
    angularDamping: 0.05
  # /inky

- type: entity
  parent: [MobSpaceLeviathanSegmentBase, FlyingMobBase]
  id: SpaceWhaleSegment
  categories: [ HideSpawnMenu ]
  components:
  - type: RadarBlip
    scale: 2
    shape: diamond
    visibleFromOtherGrids: true
  - type: Sprite
    layers:
    - state: segment
  - type: Tag
    tags:
    - HideContextMenu
    - SpaceWhaleSegment
  - type: Physics
    bodyType: Dynamic
  - type: TailedEntitySegment
  - type: ViewconeOccludable
    useMemory: false

- type: entity
  id: SpaceLeviathanDespawn
  parent: SpaceLeviathan
  suffix: despawns
  components:
  - type: TimedDespawn
    lifetime: 190 # to further prevent shitters from abusing it if something came up

- type: entity
  id: SpaceLeviathanMobCaller
  name: mob caller (space leviathan)
  categories: [HideSpawnMenu]
  components:
  - type: MobCaller
    spawnProto: SpaceLeviathan # inky
    maxAlive: 1
    needAnchored: false
    needPower: false
    minDistance: 300 # inky
    maxDistance: 400 # inky
    spawnSpacing: 30

# inky - this shit is here because i am a lazy fucking bitch
- type: damageModifierSet
  id: Leviathan
  coefficients:
    Heat: 0.5 # no lasers

- type: entity
  id: LeviathanGrapplingGun
  parent: WeaponGrapplingGun
  name: leviathan maker hook
  description: A modified grappling hook used by senior salvage specialists to ride the young space whales. To use, attach directly to the head of the whale, and steer it left and right. Beware that the whale can enter hyperspace if brought too close to the station.
  components:
  - type: GrapplingGun
    leviathanControl: true
  - type: Construction
    graph: LeviathanGrappling
    node: hook
  - type: Sprite
    sprite: _Inky/Objects/Guns/Launchers/leviathan_gun.rsi
    layers:
    - state: base
    - state: base-unshaded
      map: [ "unshaded" ]
      visible: true

- type: entity
  parent: MaterialBase
  id: MaterialLeviathanScale
  name: leviathan scale plates
  description: Shards shed from a space leviathan, exceptionally rare. Favored by salvagers, and by megacorpos for luxury goods stitched from endangered starlife.
  suffix: Full
  components:
  - type: Sprite
    sprite: _Inky/Objects/Materials/leviathan.rsi
    layers:
    - state: scale
      map: [ "base" ]
  - type: StackPrice
    price: 15000
  - type: Appearance
  - type: Stack
    stackType: Leviathan
    baseLayer: base
    layerStates:
    - scale
    - scale1
    - scale2
  - type: Item
    size: Large
    sprite: _Inky/Objects/Materials/leviathan.rsi
    shape:
    - 0,0,2,2

- type: entity
  parent: MaterialLeviathanScale
  id: MaterialLeviathanScale1
  suffix: 1
  components:
  - type: Stack
    count: 1

- type: stack
  parent: BaseVerySmallStack
  id: Leviathan
  name: stack-leviathan-hide
  icon: { sprite: /Textures/_Inky/Objects/Materials/leviathan.rsi, state: scale }
  spawn: MaterialLeviathanScale1

- type: constructionGraph
  id: LeviathanGrappling
  graph:
  - node: start
    edges:
    - to: hook
      steps:
      - material: Leviathan
        amount: 1
        doAfter: 2
  - node: hook
    entity: LeviathanGrapplingGun
# /inky
