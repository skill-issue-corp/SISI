- type: entity
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  id: MachineMasterMaterialSilo
  name: master material silo
  description: Master silo which distributes inserted materials to all silos on the station.
  components:
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true
    noRot: true
  - type: Sprite
    sprite: _Goobstation/Structures/Machines/silo.rsi
    layers:
    - state: ore_silo
    - state: inserting
      visible: false
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
  - type: Machine
    board: MaterialSiloMachineCircuitboard
  - type: Appearance
  - type: MasterSilo
    whitelist:
      tags:
      - Sheet
      - RawMaterial
      - Ingot
    blacklist:
      components:
      - Unremoveable
      - UnclaimedOre
      tags:
      - Ore # oreproc uses it not silos
