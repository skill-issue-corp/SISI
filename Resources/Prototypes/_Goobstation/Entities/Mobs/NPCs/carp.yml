- type: entity
  name: sharkminnow
  id: MobSharkDragon
  suffix: DragonBrood
  parent: MobShark
  components:
    - type: GhostRole
      allowMovement: true
      allowSpeech: true
      makeSentient: true
      name: ghost-role-information-sentient-shark-name
      description: ghost-role-information-sentient-carp-description
      rules: ghost-role-information-space-dragon-summoned-carp-rules
      mindRoles:
      - MindRoleGhostRoleTeamAntagonist
      raffle: null
    - type: GhostTakeoverAvailable
    - type: HTN
      rootTask:
        task: DragonCarpCompound
    - type: Tag
      tags:
        - Carp
        - DoorBumpOpener
    - type: CollectiveMind
      defaultChannel: Dragonmind
      channels:
      - Dragonmind

# carp but with dragon compound to make it follow the carp caller
# inky edit start
- type: entity
  id: MobCarpSleepy
  name: sleepy carp
  parent: BaseMobCarp # to make it not rainbow
  components:
  - type: HTN
    rootTask:
      task: DragonCarpCompound
  - type: Reflect
    reflectProb: 1
    spread: 120
  - type: Sprite
    sprite: _Inky/Mobs/Animals/carp.rsi
# /inky
